services:
  postgres:
    image: postgres:16-alpine
    container_name: cubo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cubo
      POSTGRES_PASSWORD: cubo_password
      POSTGRES_DB: cubo_mvp
    ports:
      - "5432:5432"
    volumes:
      - cubo_postgres_data:/var/lib/postgresql/data

volumes:
  cubo_postgres_data:
